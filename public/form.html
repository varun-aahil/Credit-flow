<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CreditFlow - Business Loan Application</title>
    <link rel="stylesheet" href="./css/styles.css">
    <link rel="stylesheet" href="./css/form.css">
</head>
<body>
    <header class="header">
        <nav class="nav-container">
            <div class="logo">
                <img src="https://raw.githubusercontent.com/lucide-icons/lucide/main/icons/building-2.svg" alt="CreditFlow Logo">
                <span>CreditFlow</span>
            </div>
            <ul class="nav-links">
                <li><a href="/">Home</a></li>
                <li><a href="#features">Features</a></li>
                <li><a href="#eligibility">Eligibility</a></li>
                <li><a href="#contact">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main class="loan-application">
        <div class="container">
            <div class="application-form">
                <div class="form-header">
                    <img src="https://raw.githubusercontent.com/lucide-icons/lucide/main/icons/briefcase.svg" alt="Business">
                    <h1>Business Loan Application</h1>
                </div>

                <form id="loanForm" method="post" action="/apply">
                    <!-- Business Details -->
                    <div class="form-group">
                        <label for="businessName">Business Name</label>
                        <input type="text" id="businessName" name="businessName" required>
                    </div>
                    <div class="form-group">
                        <label for="businessType">Business Type</label>
                        <select id="businessType" name="businessType" required>
                            <option value="">Select business type</option>
                            <option value="proprietorship">Proprietorship</option>
                            <option value="partnership">Partnership</option>
                            <option value="pvtLtd">Private Limited</option>
                            <option value="llp">LLP</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="yearEstablished">Year Established</label>
                        <input type="number" id="yearEstablished" name="yearEstablished" min="1900" required>
                    </div>

                    <!-- Loan Details -->
                    <div class="form-group">
                        <label for="loanAmount">Loan Amount</label>
                        <input type="number" id="loanAmount" name="loanAmount" required>
                    </div>
                    <div class="form-group">
                        <label for="loanPurpose">Purpose of Loan</label>
                        <select id="loanPurpose" name="loanPurpose" required>
                            <option value="">Select loan purpose</option>
                            <option value="workingCapital">Working Capital</option>
                            <option value="expansion">Business Expansion</option>
                            <option value="equipment">Equipment Purchase</option>
                            <option value="inventory">Inventory Purchase</option>
                        </select>
                    </div>

                    <!-- Personal Details -->
                    <div class="form-group">
                        <label for="ownerName">Owner's Name</label>
                        <input type="text" id="ownerName" name="ownerName" required>
                    </div>
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" name="email" required>
                    </div>
                    <div class="form-group">
                        <label for="phone">Phone Number</label>
                        <input type="tel" id="phone" name="phone" required>
                    </div>

                    <button type="submit" class="btn-primary">Submit Application</button>
                </form>
            </div>
        </div>
    </main>

    <script src="./js/form-validation.js"></script>
    <script src="./js/form-steps.js"></script>
</body>
</html>
